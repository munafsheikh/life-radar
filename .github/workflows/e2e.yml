name: E2E

on:
  push:
    branches: [master]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    env:
      TEST_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm install
      - run: ./run_e2e_tests.sh "${{ secrets.DEV_API_KEY }}" "${{ secrets.TESTING_CLIENT_ID }}" "$TEST_URL"
